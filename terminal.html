<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenAero Terminal</title>

<style>
  :root {
    --term-bg: #0c0c0c;
    --term-green: #4ade80;
    --term-blue: #60a5fa;
    --term-purple: #a78bfa;
    --term-cyan: #22d3ee;
    --term-text: #e5e7eb;
    --term-dim: rgba(229, 231, 235, 0.5);
    --input-bg: rgba(255, 255, 255, 0.03);
  }

  [data-theme="light"] {
    --term-bg: #f4f4f5;
    --term-green: #166534;
    --term-blue: #1e40af;
    --term-purple: #6b21a8;
    --term-cyan: #155e75;
    --term-text: #18181b;
    --term-dim: rgba(0, 0, 0, 0.6);
    --input-bg: rgba(0, 0, 0, 0.05);
  }

  body {
    margin: 0;
    background-color: var(--term-bg);
    color: var(--term-text);
    transition: background-color 0.2s ease, color 0.2s ease;
    font-family: 'Fira Code', 'Ubuntu Mono', 'Source Code Pro', 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    z-index: 10;
    background-size: 100% 3px, 3px 100%;
    pointer-events: none;
  }

  [data-theme="light"] body::before {
    opacity: 0.1;
  }

  #terminal {
    padding: 25px;
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
    line-height: 1.4;
    text-shadow: 0 0 5px rgba(34, 211, 238, 0.3);
    scrollbar-width: thin;
    scrollbar-color: var(--term-cyan) transparent;
  }

  #terminal::-webkit-scrollbar { width: 6px; }
  #terminal::-webkit-scrollbar-thumb { background: var(--term-cyan); border-radius: 10px; }

  .line { 
    margin-bottom: 4px; 
    animation: fadeIn 0.1s ease-in;
  }

  #input-line {
    display: flex;
    align-items: center;
    padding: 15px 25px;
    background: rgba(255, 255, 255, 0.03);
    border-top: 1px solid rgba(34, 211, 238, 0.1);
    z-index: 20;
  }

  #prompt {
    font-weight: bold;
    letter-spacing: 0.5px;
  }

  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--term-cyan);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    padding-left: 2px;
    caret-color: var(--term-green);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .separator {
    color: var(--term-dim);
    letter-spacing: -1px;
  }

  .highlight { color: var(--term-purple); }
  .success { color: var(--term-green); }

  #cmd {
    caret-shape: block;
    caret-color: var(--term-green);
  }

  #input-line::after {
    content: "_";
    animation: blink 1s infinite;
    color: var(--term-green);
    font-weight: bold;
  }

  @keyframes blink { 
    0%, 100% { opacity: 1; } 
    50% { opacity: 0; } 
  }
</style>

</head>

<body>

<div id="terminal"></div>

<div id="input-line">
  <span class="prompt" id="prompt"></span>
  <input id="cmd" autofocus autocomplete="off" />
</div>

<script>

const CONFIG = {
  API: {
    KEY: "2582c5cc9b95a3ce51c21525ff6a4063",
    BASE_URL: "https://api.aviationstack.com/v1/flights"
  },

  SYSTEM: {
    USER: "openaero",
    ROOT_USER: "root",
    HOST: "tracker",
    KERNEL: "5.15.0-generic",
    OS: "OpenAero Linux v1.1"
  },

  URLS: {
    GITHUB_REPO: "https://github.com/xaviershilosaputra/OpenAero",
    DOCS: "https://github.com/youruser/openaero",
    API_PING: "https://api.github.com"
  },

  THEME: {
    STORAGE_KEY: "openaero-theme",
    MODES: ["dark", "light", "auto"]
  },

  COMMANDS: [
    "search", "help", "clear", "exit", "theme", "guide",
    "ls", "cd", "cat", "sudo", "uname", "neofetch",
    "ping", "whoami", "history"
  ],

  AUTH: {
    SUDO_PASSWORD: "admin123"
  },

  VFS: {
    "README.md": "https://raw.githubusercontent.com/xaviershilosaputra/OpenAero/main/README.md",
    "index.html": "https://github.com/xaviershilosaputra/OpenAero/blob/main/index.html",
    "terminal.html": "https://github.com/xaviershilosaputra/OpenAero/blob/main/terminal.html",
    "js": {
      "script.js": "https://github.com/xaviershilosaputra/OpenAero/blob/main/js/script.js"
    },
    "css": {
      "styles.css": "https://github.com/xaviershilosaputra/OpenAero/blob/main/css/styles.css"
    },
    "docs": {
      "CONTRIBUTING.md": "https://raw.githubusercontent.com/xaviershilosaputra/OpenAero/main/docs/CONTRIBUTING.md"
    }
  }
};

let currentDir = CONFIG.VFS;
let currentPath = "~";
let isSudo = false;

function sanitize(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function updatePrompt() {
  const user = isSudo ? CONFIG.SYSTEM.ROOT_USER : CONFIG.SYSTEM.USER;
  const host = CONFIG.SYSTEM.HOST;

  document.getElementById("prompt").innerHTML =
    `<span style="color:#4ade80">${user}</span>@` +
    `<span style="color:#60a5fa">${host}</span>:` +
    `<span style="color:#a78bfa">${currentPath}</span>${isSudo ? '#' : '$'}&nbsp;`;
}

updatePrompt();

function applyTheme(theme, persist = true) {
  let resolved = theme;

  if (!theme || theme === "auto") {
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    resolved = prefersDark ? "dark" : "light";
  }

  document.documentElement.setAttribute("data-theme", resolved);
  document.body.setAttribute("data-theme", resolved);

  if (persist && theme !== undefined) {
    try {
      localStorage.setItem(CONFIG.THEME.STORAGE_KEY, theme);
    } catch (_) {}
  }
}

function initTheme() {
  let stored = null;

  try {
    stored = localStorage.getItem(CONFIG.THEME.STORAGE_KEY);
  } catch (_) {}

  applyTheme(stored || "auto", false);

  const media = window.matchMedia("(prefers-color-scheme: dark)");
  media.addEventListener("change", () => {
    const current = localStorage.getItem(CONFIG.THEME.STORAGE_KEY);

    if (!current || current === "auto") {
      applyTheme("auto", false);
    }
  });
}

const term = document.getElementById("terminal");
const input = document.getElementById("cmd");

let commandHistory = [];
let historyIndex = -1;

input.addEventListener("keydown", async e => {
  if (e.key === "Enter") {
    const cmd = input.value.trim();
    if (cmd) {
      commandHistory.unshift(cmd); 
      historyIndex = -1;
      await handleCommand(cmd);
    }
    input.value = "";
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      input.value = commandHistory[historyIndex];
    }
  } else if (e.key === "ArrowDown") {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      input.value = commandHistory[historyIndex];
    } else {
      historyIndex = -1;
      input.value = "";
    }
  } else if (e.key === "Tab") {
    e.preventDefault();
    const current = input.value.toLowerCase();
    const commands = ["search", "help", "clear", "exit", "theme", "guide", "ls", "cd", "cat", "sudo", "uname", "neofetch", "ping", "whoami", "history"];
    const match = CONFIG.COMMANDS.find(c => c.startsWith(current));
    if (match) input.value = match + " ";
  }
});

async function print(text = "", speed = 10) {
  const div = document.createElement("div");
  div.className = "line";
  term.appendChild(div);

  const parts = text.split(/(\[\[[gbpcr]\]\])/);
  let currentSpan = document.createElement("span");
  div.appendChild(currentSpan);

  for (const part of parts) {
    if (part === "[[g]]") { currentSpan = document.createElement("span"); currentSpan.style.color = "var(--term-green)"; div.appendChild(currentSpan); continue; }
    if (part === "[[b]]") { currentSpan = document.createElement("span"); currentSpan.style.color = "var(--term-blue)"; div.appendChild(currentSpan); continue; }
    if (part === "[[p]]") { currentSpan = document.createElement("span"); currentSpan.style.color = "var(--term-purple)"; div.appendChild(currentSpan); continue; }
    if (part === "[[c]]") { currentSpan = document.createElement("span"); currentSpan.style.color = "var(--term-cyan)"; div.appendChild(currentSpan); continue; }
    if (part === "[[r]]") { currentSpan = document.createElement("span"); currentSpan.style.color = "var(--term-text)"; div.appendChild(currentSpan); continue; }

    const safePart = sanitize(part);
    let i = 0;
    
    while (i < safePart.length) {
      if (safePart[i] === '&') {
        const entityEnd = safePart.indexOf(';', i);
        if (entityEnd !== -1) {
          currentSpan.innerHTML += safePart.substring(i, entityEnd + 1);
          i = entityEnd + 1;
        } else {
          currentSpan.innerHTML += safePart[i];
          i++;
        }
      } else {
        currentSpan.innerHTML += safePart[i];
        i++;
      }

      term.scrollTop = term.scrollHeight;
      if (speed > 0) await new Promise(r => setTimeout(r, speed));
    }
  }
  return Promise.resolve();
}

async function banner() {
  const now = new Date().toUTCString();
  await print("[[c]]Welcome to OpenAero OS v1.1.0-release (kernel 5.15.0-generic)[[r]]");
  await print(`System information as of ${now}`);
  await print("");
  await print(` * Documentation:  ${CONFIG.URLS.DOCS}`);
  await print(" * Management:     Terminal View (CLI Active)");
  await print(" * Support:        Open Source Community");
  await print("");
  await print("Last login: " + new Date().toLocaleDateString() + " from 127.0.0.1");
  await print("Type [[g]]'help'[[r]] to see available commands.");
  await print("");
}

async function help() {
  await print("[[p]]--- OpenAero Help Menu ---[[r]]");
  await print("");
  await print("[[b]]Flight Tracking:[[r]]");
  await print("  [[g]]search <ID>[[r]]  Track a specific flight (e.g., [[c]]search SQ322[[r]])");
  await print("  [[g]]guide <topic>[[r]] Learn about [[c]]metar, flight,[[r]] or [[c]]status[[r]] data");
  await print("");
  await print("[[b]]File System (Browse Source Code):[[r]]");
  await print("  [[g]]ls[[r]]             List files in the current folder");
  await print("  [[g]]cd <folder>[[r]]    Move into a folder (e.g., [[c]]cd js[[r]])");
  await print("  [[g]]cd ..[[r]]          Go back up one folder");
  await print("  [[g]]cat <file>[[r]]     Open and read a file in a new tab");
  await print("");
  await print("[[b]]System & Security:[[r]]");
  await print("  [[g]]sudo[[r]]           Log in as [[p]]root[[r]] to access the GitHub repo");
  await print("  [[g]]whoami[[r]]         Check if you are a standard user or root");
  await print("  [[g]]history[[r]]        See a list of your recently used commands");
  await print("  [[g]]neofetch[[r]]       Display system status and aircraft info");
  await print("  [[g]]ping <host>[[r]]    Test your real-time connection to the web");
  await print("  [[g]]uname[[r]]          Show the current OS kernel version");
  await print("");
  await print("[[b]]General & UI Control:[[r]]");
  await print("  [[g]]theme <mode>[[r]]   Set [[c]]dark, light,[[r]] or [[c]]auto[[r]]");
  await print("  [[g]]clear[[r]]           Empty the terminal screen");
  await print("  [[g]]exit[[r]]            Close the terminal and return home");
  await print("");
}

function validateFlight(f) {
  return /^[A-Z0-9]{2,3}[0-9]{1,4}[A-Z]?$/i.test(f);
}

async function searchFlight(flight) {
  await print("Connecting to aviationstack API...");
  await print("Fetching flight telemetry...");
  
  try {
    const url = `${CONFIG.API.BASE_URL}?access_key=${CONFIG.API.KEY}&flight_iata=${encodeURIComponent(flight)}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.data || !data.data.length) {
      await print("[[p]]No results found for IDENT: [[r]]" + flight);
      return;
    }

    const f = data.data[0];
    await print("[[c]]--- TELEMETRY DATA RECOVERY ---[[r]]");
    await print(`[[p]]IDENT:[[r]]      ${f.flight?.iata || "N/A"}`);
    await print(`[[p]]CARRIER:[[r]]    ${f.airline?.name || "Unknown"}`);
    await print(`[[p]]STATUS:[[r]]     [[g]]${(f.flight_status || "unknown").toUpperCase()}[[r]]`);
    await print("");
    await print(`[[b]]VECTOR:[[r]]     [[c]]${f.departure?.iata}[[r]] -> [[c]]${f.arrival?.iata}[[r]]`);
    await print(`[[b]]DEP_NAME:[[r]]   ${f.departure?.airport}`);
    await print(`[[b]]ARR_NAME:[[r]]   ${f.arrival?.airport}`);
    await print("");
    await print(`[[p]]SCHED_DEP:[[r]]  ${f.departure?.scheduled}`);
    await print(`[[p]]SCHED_ARR:[[r]]  ${f.arrival?.scheduled}`);
    await print("[[c]]--------------------------------[[r]]");
    await print("");
  } catch (e) {
    await print("[[p]]Error:[[r]] Connection to remote host failed.");
  }
}

async function handleCommand(cmd) {
  await print("[[g]]openaero[[r]]@[[b]]tracker[[r]]:[[p]]~[[r]]$ " + cmd, 0);
  
  const parts = cmd.trim().split(" ");
  const base = parts[0].toLowerCase();

  if (base === "help") return await help();
  if (base === "clear") {
    term.innerHTML = "";
    return;
  }

  if (base === "search") {
    const flight = parts[1];
    if (!flight || !validateFlight(flight)) {
      await print("Invalid flight format. Example: SQ322");
      return;
    }
    await searchFlight(flight.toUpperCase());
    return;
  }

  if (base === "theme") {
    const mode = parts[1];
    if (!mode || !CONFIG.THEME.MODES.includes(mode)) {
      await print("Usage: theme <dark|light|auto>");
      return;
    }

    applyTheme(mode, true);

    await print(`[[g]]System:[[r]] Global UI theme set to [[b]]${mode.toUpperCase()}[[r]]`);
    await print(`[[c]]Notice:[[r]] Contrast and font colors adjusted for ${mode} mode.`);
    return;
  }

  if (base === "guide") {
    const topic = parts[1];

    if (!topic) {
        await print("Usage: guide <topic>");
        await print("Topics: metar, flight, status");
        return;
    }

    if (topic === "metar") {
        await print("METAR Guide:");
        await print("  Example: METAR WSSS 121200Z 18010KT 9999 FEW020 30/24 Q1012");
        await print("  WSSS    → Airport ICAO code");
        await print("  121200Z → Date/time (12th day, 12:00 UTC)");
        await print("  18010KT → Wind (180° at 10 knots)");
        await print("  9999    → Visibility (10km+)");
        await print("  FEW020  → Few clouds at 2000 ft");
        await print("  30/24   → Temp/Dew point (°C)");
        await print("  Q1012   → Pressure (hPa)");
        return;
    }

    if (topic === "flight") {
        await print("Flight Data Guide:");
        await print("  Status: scheduled | active | landed | cancelled");
        await print("  Delay: minutes behind schedule");
        await print("  Gate/Terminal: boarding info");
        await print("  Aircraft: plane type (e.g. B77W)");
        return;
    }

    if (topic === "status") {
        await print("Status Guide:");
        await print("  scheduled → not departed yet");
        await print("  active    → currently flying");
        await print("  landed    → arrived");
        await print("  cancelled → flight cancelled");
        return;
    }

    await print("Unknown guide topic.");
    return;
  }

  if (base === "ls") {
    const entries = Object.keys(currentDir);
    let output = "";
    entries.forEach(entry => {
      const isDir = typeof currentDir[entry] === "object";
      output += isDir ? `[[b]]${entry}/[[r]]  ` : `[[g]]${entry}[[r]]  `;
    });
    await print(output);
    return;
  }

  if (base === "cd") {
    const target = parts[1];
    if (!target || target === "~" || target === "/" || target === "..") {
      currentDir = VFS;
      currentPath = "~";
    } else if (currentDir[target] && typeof currentDir[target] === "object") {
      currentDir = currentDir[target];
      currentPath = `~/${target}`;
    } else {
      await print(`cd: folder not found: ${target}`);
    }
    updatePrompt();
    return;
  }

  if (base === "cat") {
    const file = parts[1];
    if (!file) {
      await print("usage: cat <file>");
    } else if (currentDir[file] && typeof currentDir[file] === "string") {
      await print(`[[c]]Reading remote source: ${file}...[[r]]`);
      const url = currentDir[file];
      window.open(url, "_blank");
    } else {
      await print(`cat: ${file}: No such file or directory`);
    }
    return;
  }

  if (base === "sudo") {
    if (isSudo) {
      await print("Already running as root.");
      return;
    }
    
    const pass = prompt("[sudo] password for openaero:");
    if (pass !== CONFIG.AUTH.SUDO_PASSWORD) {
      await print("sudo: 1 incorrect password attempt");
      return;
    }

    await print("[[p]]ALRT:[[r]] Elevated privileges requested.");
    await print("Logging into GitHub OpenAero Kernel...");
    isSudo = true;
    updatePrompt();
    await print("[[g]]Session promoted to ROOT.[[r]] Opening Repository...");
    
    setTimeout(() => {
      window.open(CONFIG.URLS.GITHUB_REPO, "_blank");
    }, 1000);
    return;
  }

  if (base === "whoami") {
    await print(isSudo ? "root" : "openaero");
    return;
  }

  if (base === "uname") {
    await print("OpenAero-OS 5.15.0-generic x86_64 GNU/Linux");
    return;
  }

  if (base === "neofetch") {
    const theme = localStorage.getItem(CONFIG.THEME.STORAGE_KEY) || "auto";
    const user = isSudo ? "root" : "openaero";
    
    const uptimeMins = Math.floor((performance.now() / 60000));
    const uptimeStr = uptimeMins > 0 ? `${uptimeMins}m` : "initial boot";

    await print("[[c]]     ______          [[r]] [[c]]" + user + "[[r]]@[[b]]openaero[[r]]");
    await print("[[c]]  -- \\____/\\         [[r]] ----------------");
    await print("[[c]]  --- \\____\\\\        [[r]] [[p]]OS:[[r]] OpenAero Linux v1.1");
    await print("[[c]]  --- /     \\\\       [[r]] [[p]]Kernel:[[r]] 5.15.0-vfs");
    await print("[[c]]  -- /______//       [[r]] [[p]]Uptime:[[r]] " + uptimeStr);
    await print("[[c]]    \\______/         [[r]] [[p]]Theme:[[r]] " + theme.toUpperCase());
    await print("[[c]]                     [[r]] [[p]]Uplink:[[r]] Active (AviationStack)");
    return;
  }

  if (base === "ping") {
    const host = CONFIG.URLS.API_PING;
    await print(`PING ${host} via HTTPS/GET...`);

    for (let i = 0; i < 3; i++) {
      const start = performance.now();
      try {
        await fetch(host, { mode: 'no-cors' });
        const end = performance.now();
        const duration = (end - start).toFixed(2);
        await print(`Reply from ${host}: time=${duration}ms status=OK`);
      } catch (e) {
        await print(`Request timeout for ${host}`);
      }
      await new Promise(r => setTimeout(r, 500));
    }
    return;
  }

  if (base === "history") {
    if (commandHistory.length === 0) {
      await print("No history found.");
      return;
    }
    const historyCopy = [...commandHistory].reverse();
    for (let i = 0; i < historyCopy.length; i++) {
      await print(`  ${i + 1}  ${historyCopy[i]}`);
    }
    return;
  }

  if (base === "exit") {
    await print("Exiting OpenAero Terminal...");
    setTimeout(() => {
        window.location.href = "index.html";
    }, 500);
    return;
  }

  await print("Command not found. Type 'help'.");
}

window.addEventListener("storage", (e) => {
  if (e.key === CONFIG.THEME.STORAGE_KEY) {
    applyTheme(e.newValue || "dark");
    print(`[system] Theme synced: ${e.newValue}`);
  }
});

initTheme();
banner();
</script>

</body>
</html>
